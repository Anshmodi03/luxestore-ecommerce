<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" href="/assets/videos/hero-bg.webm" as="video" type="video/webm" />
    <title>LuxeStore - Cinematic Luxury</title>
    <meta name="description" content="Discover premium curated essentials for modern life at LuxeStore. Fashion, tech, home decor and more." />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LuxeStore - Cinematic Luxury" />
    <meta property="og:description" content="Discover premium curated essentials for modern life. Fashion, tech, home decor and more." />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:url" content="https://luxestore.com" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LuxeStore - Cinematic Luxury" />
    <meta name="twitter:description" content="Discover premium curated essentials for modern life." />
    <meta name="twitter:image" content="/og-image.jpg" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Alex+Brush&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Prevent dark mode flash -->
    <script>
      (function(){var t=localStorage.getItem('luxestore_theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark')}})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Google Model Viewer for 3D/AR Support -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
